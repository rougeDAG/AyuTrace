name: ayutrace
description: "AyuTrace - Ayurvedic Medicine Tracking App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # DI
  get_it: ^8.0.3

  # Routing
  go_router: ^15.1.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  pdf: ^3.11.3
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
